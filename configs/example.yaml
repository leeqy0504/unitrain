# ── 7. YOLO26 OBB 旋转框检测 ───────────────────────────────────────────────
# OBB 数据格式要求：YOLO OBB txt 格式
#   每行: class_id x1 y1 x2 y2 x3 y3 x4 y4 (归一化四角点坐标)
#   数据集结构:
#     data/obb/
#     ├── images/{train,val}/
#     ├── labels/{train,val}/     # YOLO OBB 格式 txt
#     └── data.yaml
#
#   data.yaml 示例:
#     path: /abs/path/to/data/obb
#     train: images/train
#     val: images/val
#     nc: 15
#     names: [plane, ship, ...]
---
framework: ultralytics
model: yolo26n-obb        # yolo26n-obb | yolo26s-obb | yolo26m-obb | yolo26l-obb | yolo26x-obb
task: obb

data:
  path: data/obb          # YOLO OBB 格式数据集 (无需 COCO 转换)
  format: coco            # 设为 coco 时 OBB task 会自动跳过转换
  nc: 15

train:
  epochs: 100
  imgsz: 1024             # OBB 通常使用较大分辨率
  batch: 8
  device: 0
  output_dir: outputs

export:
  format: onnx


# ── 8. YOLOE 开放词汇检测与分割 ──────────────────────────────────────────
# YOLOE 开放词汇模型支持自定义文本类名提示 (class_prompts)
# 无需类别数量 (nc) 和类别名称 (names)，由 class_prompts 动态定义
# 模型命名: yoloe-{backbone}{size}-seg (如 yoloe-26s-seg, yoloe-11l-seg)
# Prompt-Free 变体: yoloe-{backbone}{size}-seg-pf
---
framework: ultralytics
model: yoloe-26s-seg       # yoloe-26n-seg | yoloe-26s-seg | yoloe-26m-seg | yoloe-26l-seg | yoloe-26x-seg
task: segment

# class_prompts: 开放词汇文本提示 —— 模型在推理/训练时使用这些类名
class_prompts:
  - person
  - car
  - dog
  - cat

data:
  path: data/coco
  format: coco
  nc: 4                   # 与 class_prompts 数量一致
  names: [person, car, dog, cat]

train:
  epochs: 100
  imgsz: 640
  batch: 16
  device: 0
  output_dir: outputs

export:
  format: onnx

