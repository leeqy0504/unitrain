# UniTrain 配置示例 (Unified DL Training Framework)
# ============================================================================
# 本文件包含所有支持的配置参数说明和示例。
#
# 配置格式: Nested 格式 (推荐)
#   - 参数嵌套在 data/train/predict/export 命名空间下
#   - 框架同时支持 Flat 格式，但推荐使用 Nested 格式保持一致性
#
# 运行方式:
#   ./run.sh train   --config configs/example.yaml
#   ./run.sh predict --config configs/example.yaml --source image.jpg
#   ./run.sh export  --config configs/example.yaml --format onnx
#
# 完整参数说明请查看: configs/README.md
# ============================================================================

# ============================================================================
# 参数说明速查
# ============================================================================
#
# 【顶层参数】
#   framework: rfdetr | ultralytics | yolo
#   model: 见下方各框架的模型列表
#   task: detect | segment
#
# 【data 命名空间】
#   path: 数据集根目录 (COCO 格式)
#   format: coco (当前仅支持)
#   nc: 类别数量 (可选，自动检测)
#   names: 类别名称列表 (可选，自动生成)
#
# 【train 命名空间 - 通用】
#   epochs: 训练轮数
#   batch: 每卡 batch size
#   device: GPU 配置 (见下方详细说明)
#   output_dir: 输出目录基路径
#
# 【train 命名空间 - RF-DETR 专用】
#   lr: 学习率 (默认 1e-4)
#   grad_accum_steps: 梯度累积步数 (默认 4)
#   early_stopping: 是否启用早停 (默认 false)
#   early_stopping_patience: 早停等待轮数 (默认 10)
#   early_stopping_min_delta: 早停最小改善阈值 (默认 0.001)
#   resume: 恢复训练的 checkpoint 路径
#
# 【train 命名空间 - Ultralytics 专用】
#   imgsz: 输入图像尺寸 (默认 640)
#
# 【predict 命名空间】
#   threshold: 置信度阈值 (默认 0.5)
#   weights: 自定义权重路径 (可选)
#   output_dir: 推理输出目录 (默认 outputs/predict)
#
# 【export 命名空间】
#   format: 导出格式 (onnx | torchscript)
#
# ============================================================================
# GPU 设备配置详解
# ============================================================================
#
# 【单卡训练】
#   device: 0           # 使用 GPU 0
#   device: 1           # 使用 GPU 1
#
# 【多卡训练 (DDP)】
#   device: "0,1"       # 使用 GPU 0 和 1 (必须用字符串格式)
#   device: "2,3"       # 使用 GPU 2 和 3
#   device: "0,1,2,3"   # 使用 4 张 GPU
#
#   注意事项:
#   - 必须用字符串格式（带引号）
#   - RF-DETR 自动启用 DDP (DistributedDataParallel)
#   - 总等效 batch = batch × grad_accum_steps × num_gpus
#   - 例如: batch=4, grad_accum=4, 2 GPUs → 总 batch=32
#
# 【CPU 训练】
#   device: "cpu"       # 仅 CPU (测试用，速度较慢)
#
# 【环境变量方式】
#   CUDA_VISIBLE_DEVICES=1 ./run.sh train --config configs/example.yaml
#   CUDA_VISIBLE_DEVICES=2,3 ./run.sh train --config configs/example.yaml
#
# ============================================================================
# RF-DETR 模型分辨率参考 (自动设置)
# ============================================================================
#
# 【目标检测】
#   nano:       384×384 (最快)
#   small:      512×512
#   medium:     576×576 (推荐平衡)
#   base:       560×560 (高精度)
#   large:      560×560 (最高精度)
#
# 【实例分割】
#   seg-nano:    312×312 (最快)
#   seg-small:   432×432
#   seg-medium:  504×504 (推荐平衡)
#   seg-base:    560×560 (高精度)
#   seg-large:   560×560
#   seg-xlarge:  672×672
#   seg-2xlarge: 672×672 (最高精度)
#
# ============================================================================
# 预训练权重说明
# ============================================================================
#
# 【自动权重管理】
#   - 预训练权重自动下载到 weights/ 目录
#   - 框架自动解析模型对应的权重文件名
#   - 无需手动指定，开箱即用
#
# 【使用自定义权重】
#   predict:
#     weights: weights/my_best.pt              # 相对路径
#     weights: /absolute/path/to/weights.pth   # 绝对路径
#
# 【恢复训练】
#   train:
#     resume: outputs/project/rfdetr_20260211_123456/checkpoint.pth
#
# ============================================================================
# 模型评估说明
# ============================================================================
#
# 【基本用法】
#   ./run.sh eval --config configs/your.yaml --weights outputs/.../best.pth
#
# 【配置文件方式】
#   eval:
#     weights: outputs/.../checkpoint_best_ema.pth  # 权重路径 (必须)
#     split: val              # val 或 test (默认 val)
#     conf_threshold: 0.001   # 置信度阈值 (COCO 标准 0.001)
#     iou_threshold: 0.5      # IoU 阈值
#     output_dir: ""          # 输出目录 (空=自动基于权重路径)
#
# 【输出内容】
#   - 终端表格: per-class F1/Precision/Recall/mAP
#   - JSON 文件: eval_metrics.json (完整结构化数据)
#   - CSV 文件: eval_metrics.csv (便于 Excel 分析)
#   - Markdown: eval_report.md (含图表的评估报告)
#   - 图表 (PNG):
#     · PR 曲线 (Precision-Recall)
#     · F1-Confidence 曲线
#     · 混淆矩阵热力图
#     · 训练损失曲线
#     · Per-class 指标柱状图
#     · mAP 变化曲线
#
# ============================================================================

# ── 1. RF-DETR 目标检测 (基础) ──────────────────────────────────────────────
---
framework: rfdetr
model: medium             # nano | small | medium | base | large
task: detect

data:
  path: data/coco         # COCO 格式数据集根目录
  format: coco
  nc: 80

train:
  epochs: 100
  batch: 4
  grad_accum_steps: 4     # 等效 batch = batch × grad_accum_steps
  lr: 0.0001
  device: 0               # GPU: 0 (单卡) | "0,1" (多卡) | "cpu"
  output_dir: outputs

  # 早停 (可选)
  early_stopping: true
  early_stopping_patience: 10
  early_stopping_min_delta: 0.001

  # 恢复训练 (可选, 取消注释使用)
  # resume: outputs/output_XXXXXXXX_XXXXXX/checkpoint.pth

predict:
  threshold: 0.5
  # weights: weights/best.pt  # 自定义权重 (不设置则使用预训练)

export:
  format: onnx


# ── 2. RF-DETR 实例分割 ─────────────────────────────────────────────────────
---
framework: rfdetr
model: seg-nano           # seg-nano | seg-small | seg-medium | seg-base | seg-large
task: segment

data:
  path: data/coco         # 需含分割掩码的 COCO 数据集
  format: coco
  nc: 80

train:
  epochs: 200
  batch: 4
  grad_accum_steps: 4
  lr: 0.0001
  device: 0
  output_dir: outputs

  early_stopping: true
  early_stopping_patience: 10
  early_stopping_min_delta: 0.001

predict:
  threshold: 0.5

export:
  format: onnx


# ── 3. Ultralytics YOLO11 目标检测 ───────────────────────────────────────────
---
framework: ultralytics
model: yolo11n            # yolo11n | yolo11s | yolo11m | yolo11l | yolo11x
task: detect

data:
  path: data/coco         # COCO 格式 (自动转换为 YOLO 格式)
  format: coco
  nc: 80
  names: []               # 留空则自动生成

train:
  epochs: 100
  imgsz: 640
  batch: 16
  device: 0
  output_dir: outputs

export:
  format: onnx


